<svg xmlns="http://www.w3.org/2000/svg" width="1560" height="780" viewBox="0 0 1560 780" preserveAspectRatio="xMidYMin meet" style="width:min(100%, 100vw, calc(100vh * 2.000000));height:auto;display:block;margin:0 auto;"><rect x="0" y="0" width="100%" height="100%" fill="white"/><defs><marker id="arrowhead-flow" markerWidth="10" markerHeight="8" refX="8" refY="4" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,8 L10,4 z" fill="#566573"/></marker></defs><text x="70" y="60" font-size="28" font-weight="600" fill="#1f2d3d">Milestone 12 Design Creation &amp; Optimization Process</text><text x="70" y="95" font-size="18" fill="#34495e">Primitive selective-routing pipeline for bifurcation/trifurcation treatment trees.</text><line x1="320.0" y1="205.0" x2="370.0" y2="205.0" stroke="#566573" stroke-width="3" marker-end="url(#arrowhead-flow)"/><line x1="650.0" y1="205.0" x2="700.0" y2="205.0" stroke="#566573" stroke-width="3" marker-end="url(#arrowhead-flow)"/><line x1="980.0" y1="205.0" x2="1030.0" y2="205.0" stroke="#566573" stroke-width="3" marker-end="url(#arrowhead-flow)"/><line x1="1310.0" y1="205.0" x2="1360.0" y2="205.0" stroke="#566573" stroke-width="3" marker-end="url(#arrowhead-flow)"/><line x1="840.0" y1="290.0" x2="840.0" y2="410.0" stroke="#566573" stroke-width="3" marker-end="url(#arrowhead-flow)"/><line x1="1040.0" y1="495.0" x2="975.0" y2="495.0" stroke="#566573" stroke-width="3" marker-end="url(#arrowhead-flow)"/><line x1="710.0" y1="495.0" x2="635.0" y2="495.0" stroke="#566573" stroke-width="3" marker-end="url(#arrowhead-flow)"/><line x1="375.0" y1="495.0" x2="310.0" y2="495.0" stroke="#566573" stroke-width="3" marker-end="url(#arrowhead-flow)"/><rect x="40.0" y="120.0" width="280.0" height="170.0" rx="16" ry="16" fill="#eef6ff" stroke="#2e86de" stroke-width="2.5"/><text x="54.0" y="145.0" font-size="15" font-weight="600" fill="#1f2d3d">1. Primitive candidate</text><text x="54.0" y="164.5" font-size="15" font-weight="600" fill="#1f2d3d">generation</text><text x="54.0" y="188.0" font-size="12" fill="#34495e">cfd-schematics::create_geometry</text><text x="54.0" y="206.0" font-size="12" fill="#34495e">Mirrored Bi/Tri split trees</text><text x="54.0" y="224.0" font-size="12" fill="#34495e">Branch-diameter biasing for</text><text x="54.0" y="242.0" font-size="12" fill="#34495e">RBC/WBC/CTC routing</text><rect x="370.0" y="120.0" width="280.0" height="170.0" rx="16" ry="16" fill="#eefcf3" stroke="#27ae60" stroke-width="2.5"/><text x="384.0" y="145.0" font-size="15" font-weight="600" fill="#1f2d3d">2. ChannelSystem topology SSOT</text><text x="384.0" y="168.5" font-size="12" fill="#34495e">Wall ports and true split/merge</text><text x="384.0" y="186.5" font-size="12" fill="#34495e">Treatment/bypass lanes,</text><text x="384.0" y="204.5" font-size="12" fill="#34495e">serpentines, venturi throats</text><text x="384.0" y="222.5" font-size="12" fill="#34495e">No report-local topology recreation</text><rect x="700.0" y="120.0" width="280.0" height="170.0" rx="16" ry="16" fill="#fff7ea" stroke="#d68910" stroke-width="2.5"/><text x="714.0" y="145.0" font-size="15" font-weight="600" fill="#1f2d3d">3. NetworkBlueprint projection</text><text x="714.0" y="168.5" font-size="12" fill="#34495e">Lossless ChannelSystem -&gt;</text><text x="714.0" y="186.5" font-size="12" fill="#34495e">NetworkBlueprint</text><text x="714.0" y="204.5" font-size="12" fill="#34495e">Downstream solver/export only</text><text x="714.0" y="222.5" font-size="12" fill="#34495e">No independent blueprint authoring</text><rect x="1030.0" y="120.0" width="280.0" height="170.0" rx="16" ry="16" fill="#fef0f3" stroke="#c0392b" stroke-width="2.5"/><text x="1044.0" y="145.0" font-size="15" font-weight="600" fill="#1f2d3d">4. Cached cfd-1d evaluation</text><text x="1044.0" y="168.5" font-size="12" fill="#34495e">MetricsCache avoids repeat solves</text><text x="1044.0" y="186.5" font-size="12" fill="#34495e">Pressure, shear, residence, cavitation</text><text x="1044.0" y="204.5" font-size="12" fill="#34495e">Three-pop separation and safety</text><rect x="1360.0" y="120.0" width="160.0" height="170.0" rx="16" ry="16" fill="#f4f1ff" stroke="#7d3c98" stroke-width="2.5"/><text x="1374.0" y="145.0" font-size="15" font-weight="600" fill="#1f2d3d">5. Ranked</text><text x="1374.0" y="164.5" font-size="15" font-weight="600" fill="#1f2d3d">outputs</text><text x="1374.0" y="188.0" font-size="12" fill="#34495e">Option 1</text><text x="1374.0" y="206.0" font-size="12" fill="#34495e">Option 2</text><text x="1374.0" y="224.0" font-size="12" fill="#34495e">GA compare</text><rect x="975.0" y="410.0" width="260.0" height="170.0" rx="16" ry="16" fill="#f0f7ff" stroke="#2980b9" stroke-width="2.5"/><text x="989.0" y="435.0" font-size="15" font-weight="600" fill="#1f2d3d">GA Dean refinement</text><text x="989.0" y="458.5" font-size="12" fill="#34495e">InPlaceDeanSerpentineRefinement</text><text x="989.0" y="476.5" font-size="12" fill="#34495e">Serpentine Dean vortex insertion</text><text x="989.0" y="494.5" font-size="12" fill="#34495e">Curvature-peak venturi placement</text><rect x="710.0" y="410.0" width="260.0" height="170.0" rx="16" ry="16" fill="#fff6fb" stroke="#b03a78" stroke-width="2.5"/><text x="724.0" y="435.0" font-size="15" font-weight="600" fill="#1f2d3d">Option 2 combined ranking</text><text x="724.0" y="458.5" font-size="12" fill="#34495e">AsymmetricSplitVenturi</text><text x="724.0" y="476.5" font-size="12" fill="#34495e">Selective routing + venturi</text><text x="724.0" y="494.5" font-size="12" fill="#34495e">cavitation + healthy-cell</text><text x="724.0" y="512.5" font-size="12" fill="#34495e">protection</text><rect x="375.0" y="410.0" width="260.0" height="170.0" rx="16" ry="16" fill="#eefcf3" stroke="#1e8449" stroke-width="2.5"/><text x="389.0" y="435.0" font-size="15" font-weight="600" fill="#1f2d3d">Option 1 acoustic ranking</text><text x="389.0" y="458.5" font-size="12" fill="#34495e">AsymmetricSplitResidenceSeparation</text><text x="389.0" y="476.5" font-size="12" fill="#34495e">Center-lane ultrasound/light</text><text x="389.0" y="494.5" font-size="12" fill="#34495e">RBC-biased peripheral bypass</text><rect x="50.0" y="410.0" width="260.0" height="170.0" rx="16" ry="16" fill="#f4f6f7" stroke="#566573" stroke-width="2.5"/><text x="64.0" y="435.0" font-size="15" font-weight="600" fill="#1f2d3d">Report and artifact export</text><text x="64.0" y="458.5" font-size="12" fill="#34495e">Schematics from cfd-schematics</text><text x="64.0" y="476.5" font-size="12" fill="#34495e">Canonical markdown, narrative,</text><text x="64.0" y="494.5" font-size="12" fill="#34495e">figure manifest and JSON</text><text x="70" y="660" font-size="14" fill="#566573">Selective routing remains the modeled concept: branch-diameter biasing pushes RBCs peripheral, keeps WBC/CTC enrichment in treatment branches, and changes only the treatment mechanism between Option 1 and Option 2.</text></svg>