name: Legacy Migration Audit

# Helios workflow: ecosystem-uniform `.github/workflows/legacy-migration-audit.yml`.
# The gate calls the freshly-scaffolded Helios xtask:
#   cargo run -p xtask -- legacy-migration-audit
# which currently exits 0 (Helios's on-disk survey shows 0 legacy-surface matches
# across nalgebra / ndarray / burn / burn-ndarray / tokio / rayon). The gate
# becomes the SSOT forward-guard: a future PR that re-introduces one of those
# patterns will fail with the offending paths enumerated.

on:
  push:
    branches: [main, "refactor/**", "codex/**"]
  pull_request:
    branches: [main, "refactor/**", "codex/**"]

permissions:
  contents: read

concurrency:
  group: legacy-migration-audit-${{ github.ref }}
  cancel-in-progress: true

jobs:
  audit-legacy-migration:
    name: legacy-migration audit (xtask)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      CARGO_TERM_COLOR: always
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target
          key: cargo-ubuntu-latest-stable-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            cargo-ubuntu-latest-stable-

      - name: Run xtask legacy-migration-audit (Helios's Atlas gate)
        run: cargo run -p xtask -- legacy-migration-audit
